<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div class="row g-3" th:fragment="fields">
    <div class="col-md-6">
        <label class="form-label" for="title">Title</label>
        <input class="form-control" id="title" th:field="*{title}">
        <div class="form-error" th:errors="*{title}"></div>
    </div>
    <div class="col-md-6">
        <label class="form-label" for="location">Location</label>
        <input class="form-control" id="location" th:field="*{location}">
        <div class="form-error" th:errors="*{location}"></div>
    </div>
    <div class="col-md-6">
        <label class="form-label" for="salary">Salary</label>
        <input class="form-control" id="salary" type="number" step="0.01" th:field="*{salary}">
    </div>
    <div class="col-md-6">
        <label class="form-label" for="deadline">Deadline</label>
        <input class="form-control" id="deadline" type="date" th:field="*{deadline}">
        <div class="form-error" th:errors="*{deadline}"></div>
    </div>
    <div class="col-md-6">
        <label class="form-label" for="requiredMajor">Required major</label>
        <input class="form-control" id="requiredMajor" th:field="*{requiredMajor}">
        <div class="form-error" th:errors="*{requiredMajor}"></div>
    </div>
    <div class="col-md-6">
        <label class="form-label" for="requiredSkills">Required skills</label>
        <input class="form-control" id="requiredSkills" th:field="*{requiredSkills}">
        <div class="form-error" th:errors="*{requiredSkills}"></div>
    </div>
    <div class="col-12">
        <label class="form-label" for="description">Description</label>
        <textarea class="form-control" id="description" rows="5" th:field="*{description}"></textarea>
        <div class="form-error" th:errors="*{description}"></div>
    </div>
</div>
</body>
</html>
