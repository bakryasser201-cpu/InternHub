<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="container page-shell">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3">Login</h1>
                    <div class="alert alert-success" th:if="${param.registered}">Registration successful. Please login.</div>
                    <div class="alert alert-danger" th:if="${loginError}" th:text="${loginError}"></div>
                    <form th:action="@{/login}" th:object="${loginRequest}" method="post">
                        <div class="mb-3">
                            <label class="form-label" for="email">Email</label>
                            <input class="form-control" id="email" th:field="*{email}">
                            <div class="form-error" th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" type="password" th:field="*{password}">
                            <div class="form-error" th:errors="*{password}"></div>
                        </div>
                        <button class="btn btn-primary w-100" type="submit">Login</button>
                    </form>
                    <p class="mt-3 mb-0">No account? <a th:href="@{/register}">Register</a></p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
