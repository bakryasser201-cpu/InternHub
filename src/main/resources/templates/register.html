<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="container page-shell">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-3">Create account</h1>
                    <div class="alert alert-danger" th:if="${registerError}" th:text="${registerError}"></div>
                    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="email">Email</label>
                                <input class="form-control" id="email" th:field="*{email}">
                                <div class="form-error" th:errors="*{email}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="password">Password</label>
                                <input class="form-control" id="password" type="password" th:field="*{password}">
                                <div class="form-error" th:errors="*{password}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="role">Role</label>
                                <select class="form-select" id="role" th:field="*{role}">
                                    <option value="">Choose role</option>
                                    <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                                </select>
                                <div class="form-error" th:errors="*{role}"></div>
                            </div>
                            <div class="col-12 d-none" id="studentFields">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label" for="name">Name</label>
                                        <input class="form-control" id="name" th:field="*{name}">
                                        <div class="form-error" th:errors="*{name}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="university">University</label>
                                        <input class="form-control" id="university" th:field="*{university}">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="major">Major</label>
                                        <input class="form-control" id="major" th:field="*{major}">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label" for="skills">Skills</label>
                                        <textarea class="form-control" id="skills" rows="2" th:field="*{skills}"></textarea>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12 d-none" id="companyFields">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label" for="companyName">Company name</label>
                                        <input class="form-control" id="companyName" th:field="*{companyName}">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="location">Location</label>
                                        <input class="form-control" id="location" th:field="*{location}">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label" for="description">Company description</label>
                                        <textarea class="form-control" id="description" rows="3" th:field="*{description}"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary mt-4" type="submit">Register</button>
                    </form>
                    <p class="mt-3 mb-0">Already registered? <a th:href="@{/login}">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</main>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const roleSelect = document.getElementById('role');
        const studentFields = document.getElementById('studentFields');
        const companyFields = document.getElementById('companyFields');

        function updateRoleFields() {
            const selectedRole = roleSelect.value;
            studentFields.classList.toggle('d-none', selectedRole !== 'STUDENT');
            companyFields.classList.toggle('d-none', selectedRole !== 'COMPANY');
        }

        roleSelect.addEventListener('change', updateRoleFields);
        updateRoleFields();
    });
</script>
</body>
</html>
