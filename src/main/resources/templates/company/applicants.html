<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Applicants - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="container page-shell">
    <a th:href="@{/company/dashboard}" class="btn btn-outline-secondary mb-3">Back</a>
    <h1 class="h3 mb-1">Applicants</h1>
    <p class="text-secondary" th:text="${internship.title}">Internship title</p>
    <div class="table-responsive bg-white border rounded">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>Student</th>
                <th>Major</th>
                <th>Skills</th>
                <th>CV</th>
                <th>Status</th>
                <th class="text-end">Decision</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${applications}">
                <td th:text="${app.studentName}">Student</td>
                <td th:text="${app.studentMajor}">Major</td>
                <td th:text="${app.studentSkills}">Skills</td>
                <td th:text="${app.cvFileName}">CV</td>
                <td><span class="badge text-bg-secondary" th:text="${app.status}">PENDING</span></td>
                <td class="text-end">
                    <form class="d-inline" th:action="@{/company/applications/{id}/status(id=${app.id})}" method="post">
                        <input type="hidden" name="status" value="ACCEPTED">
                        <button class="btn btn-success btn-sm">Accept</button>
                    </form>
                    <form class="d-inline" th:action="@{/company/applications/{id}/status(id=${app.id})}" method="post">
                        <input type="hidden" name="status" value="REJECTED">
                        <button class="btn btn-danger btn-sm">Reject</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(applications)}"><td colspan="6" class="text-center text-secondary">No applicants yet.</td></tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
