<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Internship - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="container page-shell">
    <a th:href="@{/company/dashboard}" class="btn btn-outline-secondary mb-3">Back</a>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h3 mb-3">Create internship</h1>
            <form th:action="@{/company/internships/create}" th:object="${internship}" method="post">
                <div th:replace="~{company/internship-form :: fields}"></div>
                <button class="btn btn-primary mt-4">Create</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
