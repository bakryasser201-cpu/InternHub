<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Applications - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="container page-shell">
    <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary mb-3">Back</a>
    <h1 class="h3 mb-3">My applications</h1>
    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>
    <div class="table-responsive bg-white border rounded">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>Internship</th>
                <th>Applied</th>
                <th>Status</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="app : ${applications}">
                <td th:text="${app.internshipTitle}">Internship</td>
                <td th:text="${app.appliedDate}">Date</td>
                <td><span class="badge text-bg-secondary status-badge" th:text="${app.status}">PENDING</span></td>
                <td class="text-end">
                    <form th:action="@{/student/applications/{id}/withdraw(id=${app.id})}" method="post">
                        <button class="btn btn-outline-danger btn-sm">Withdraw</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(applications)}"><td colspan="4" class="text-center text-secondary">No applications yet.</td></tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
