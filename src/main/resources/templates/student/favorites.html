<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Favorites - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="container page-shell">
    <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary mb-3">Back</a>
    <h1 class="h3 mb-3">Favorite internships</h1>
    <div class="row g-3">
        <div class="col-md-6 col-xl-4" th:each="internship : ${favorites}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h2 class="h5" th:text="${internship.title}">Title</h2>
                    <p class="text-secondary" th:text="${internship.company.companyName}">Company</p>
                    <p th:text="${internship.description}">Description</p>
                    <form class="d-inline" th:action="@{/student/apply/{id}(id=${internship.id})}" method="post">
                        <button class="btn btn-primary btn-sm">Apply</button>
                    </form>
                    <form class="d-inline" th:action="@{/student/favorites/{id}(id=${internship.id})}" method="post">
                        <button class="btn btn-outline-danger btn-sm">Remove</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(favorites)}">
            <div class="alert alert-info">No favorite internships yet.</div>
        </div>
    </div>
</main>
</body>
</html>
