<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Dashboard - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand" th:href="@{/student/dashboard}">InternHub</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/student/profile}">Profile</a>
            <a class="btn btn-outline-secondary" th:href="@{/student/applications}">Applications</a>
            <a class="btn btn-outline-secondary" th:href="@{/student/favorites}">Favorites</a>
            <form th:action="@{/logout}" method="post"><button class="btn btn-outline-danger">Logout</button></form>
        </div>
    </div>
</nav>
<main class="container page-shell">
    <h1 class="h3 mb-1">Available internships</h1>
    <p class="text-secondary">Welcome, <span th:text="${student.name}">Student</span>.</p>
    <div class="row g-3">
        <div class="col-md-6 col-xl-4" th:each="internship : ${internships}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h2 class="h5" th:text="${internship.title}">Title</h2>
                    <p class="text-secondary mb-1" th:text="${internship.company.companyName}">Company</p>
                    <p class="mb-2" th:text="${internship.description}">Description</p>
                    <p class="small mb-1"><strong>Location:</strong> <span th:text="${internship.location}"></span></p>
                    <p class="small mb-1"><strong>Major:</strong> <span th:text="${internship.requiredMajor}"></span></p>
                    <p class="small mb-1"><strong>Skills:</strong> <span th:text="${internship.requiredSkills}"></span></p>
                    <p class="small mb-3"><strong>Deadline:</strong> <span th:text="${internship.deadline}"></span></p>
                    <div class="d-flex gap-2">
                        <form th:action="@{/student/apply/{id}(id=${internship.id})}" method="post">
                            <button class="btn btn-primary btn-sm" type="submit">Apply</button>
                        </form>
                        <form th:action="@{/student/favorites/{id}(id=${internship.id})}" method="post">
                            <button class="btn btn-outline-primary btn-sm" type="submit">Favorite</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(internships)}">
            <div class="alert alert-info">No open internships yet.</div>
        </div>
    </div>
</main>
</body>
</html>
