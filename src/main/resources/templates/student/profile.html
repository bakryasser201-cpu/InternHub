<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Profile - InternHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<main class="container page-shell">
    <a th:href="@{/student/dashboard}" class="btn btn-outline-secondary mb-3">Back</a>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h3 mb-3">Student profile</h1>
            <div th:if="${success}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>
            <div class="alert alert-success" th:if="${param.updated}">Profile updated.</div>
            <form th:action="@{/student/profile}" th:object="${profile}" method="post" enctype="multipart/form-data">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label" for="name">Name</label>
                        <input class="form-control" id="name" th:field="*{name}">
                        <div class="form-error" th:errors="*{name}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="university">University</label>
                        <input class="form-control" id="university" th:field="*{university}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="major">Major</label>
                        <input class="form-control" id="major" th:field="*{major}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="cvFile">Upload CV</label>
                        <input class="form-control" id="cvFile" name="cvFile" type="file" accept=".pdf,.doc,.docx">
                        <input type="hidden" th:field="*{cvFileName}">
                        <div class="form-text" th:if="*{cvFileName}" th:text="'Current CV: ' + *{cvFileName}"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label" for="skills">Skills</label>
                        <textarea class="form-control" id="skills" rows="4" th:field="*{skills}"></textarea>
                    </div>
                </div>
                <button class="btn btn-primary mt-4">Save profile</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
